name: Test
on:
  push:
    branches:
      - "**"
    paths-ignore:
      - "docs/**"
    tags-ignore:
      - tip
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Unit tests
        uses: vmactions/freebsd-vm@v1
        with:
          usesh: true
          prepare: |
            pkg update
            pkg install -y go git
          run: |
            SYLVE_SKIP_ZFS_TESTS=1 make test

      - name: Integration tests
        uses: vmactions/freebsd-vm@v1
        with:
          usesh: true
          copyback: true
          prepare: |
            pkg update
            pkg install -y go git
            kldload zfs || true
            kldload pf || true
            sed -i '' 's/^#*PermitRootLogin.*/PermitRootLogin prohibit-password/' /etc/ssh/sshd_config
            sysrc sshd_enable=YES
            service sshd onestart 2>/dev/null || service sshd onerestart || true
            mkdir -p /root/.ssh && chmod 700 /root/.ssh
            [ -f /root/.ssh/id_ed25519 ] || ssh-keygen -t ed25519 -N "" -f /root/.ssh/id_ed25519
            cat /root/.ssh/id_ed25519.pub >> /root/.ssh/authorized_keys
            chmod 600 /root/.ssh/authorized_keys
            ssh-keyscan -H localhost >> /root/.ssh/known_hosts 2>/dev/null || true
            for i in $(seq 1 60); do
              ssh -o BatchMode=yes -o StrictHostKeyChecking=accept-new -o ConnectTimeout=2 root@localhost true 2>/dev/null && break
              sleep 0.5
            done
            ssh -o BatchMode=yes -o StrictHostKeyChecking=accept-new root@localhost true || { echo "ssh root@localhost not ready"; exit 1; }
          run: |
            set +e
            make test-integration 2>&1 | tee test-integration.log
            echo "$?" > /tmp/it.rc
            exit "$(cat /tmp/it.rc)"

      - name: Upload integration test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-log
          path: test-integration.log
          if-no-files-found: warn
